<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0a0f2c" />
    <meta name="format-detection" content="telephone=no" />
    <title>Morix - منصة التعلم الذكي</title>
    <!-- خط Tajawal العربي -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap"
      rel="stylesheet"
    />
    <!-- بلوك عناصر Google Translate الظاهرة -->
    <style>
      #google_translate_element {
        position: fixed;
        top: -9999px;
        left: -9999px;
        width: 1px;
        height: 1px;
        overflow: hidden;
        opacity: 0;
        pointer-events: none;
      }
      .goog-te-banner-frame,
      .skiptranslate.goog-te-gadget,
      #goog-gt-tt,
      .goog-tooltip,
      .goog-te-gadget-simple,
      .VIpgJd-ZVi9od-aZ2wEe-wOHMyf-ti6hGc {
        display: none !important;
      }
      .skiptranslate > font,
      .skiptranslate iframe {
        display: none !important;
      }
      body {
        top: 0px !important;
        position: static !important;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="google_translate_element"></div>
    <script type="module" src="/src/main.js"></script>
    <!-- Google Translate — hidden widget for programmatic use -->
    <script>
      function googleTranslateElementInit() {
        try {
          new google.translate.TranslateElement({
            pageLanguage: 'ar',
            includedLanguages: 'ar,en,zh-CN,de,es,fr',
            autoDisplay: false,
            layout: google.translate.TranslateElement.InlineLayout.SIMPLE
          }, 'google_translate_element')
        } catch(e) {}
      }

      window.__morixTranslate = function(langCode) {
        try {
          var map = { ar:'ar', en:'en', zh:'zh-CN', de:'de', es:'es', fr:'fr' }
          var code = map[langCode] || langCode

          if (langCode === 'ar') {
            var sel = document.querySelector('.goog-te-combo')
            if (sel) { sel.value = 'ar'; sel.dispatchEvent(new Event('change')) }
            document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;'
            document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; domain=' + location.hostname
            return
          }

          var sel = document.querySelector('.goog-te-combo')
          if (sel) {
            sel.value = code
            sel.dispatchEvent(new Event('change'))
          } else {
            setTimeout(function() { window.__morixTranslate(langCode) }, 600)
          }
        } catch(e) {}
      }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit" async defer></script>
  </body>
</html>
